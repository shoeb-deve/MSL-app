<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSL CRM Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1012a8, #4f6bff);
      padding: 14px;
    }

    .loginBox {
      width: min(100%, 420px);
      background: white;
      padding: clamp(22px, 4vw, 40px);
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .logo {
      font-size: clamp(24px, 5vw, 30px);
      font-weight: 700;
      color: #1012a8;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 13px;
      color: #777;
      margin-bottom: 22px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #1012a8;
      box-shadow: 0 0 0 3px rgba(16, 18, 168, 0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1012a8, #4f6bff);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
    }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="loginBox">
    <div class="logo">MSL CRM</div>
    <div class="subtitle">School Sales Management System</div>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
    <div class="footer">© 2026 MSL CRM</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
